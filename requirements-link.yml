---
- name: Check application requirements
  win_stat:
    path: "{{ app.requirements_file }}"
  register: requirements_file

- name: Validate application requirements
  assert:
    that:
      - requirements_file.stat.exists
    fail_msg: "requirements.txt가 없습니다."

- name: Remove existing requirements link
  win_file:
    path: "{{ app.requirements_link }}"
    state: absent

- name: Create requirements symbolic link
  win_command: >
    cmd /c mklink
    "{{ app.requirements_link }}"
    "{{ app.requirements_file }}"

- name: Check requirements symbolic link
  win_stat:
    path: "{{ app.requirements_link }}"
  register: requirements_link

- name: Validate requirements symbolic link
  assert:
    that:
      - requirements_link.stat.exists
    success_msg: "requirements 심볼릭 링크 생성 완료"
    fail_msg: "requirements 심볼릭 링크 생성 실패"
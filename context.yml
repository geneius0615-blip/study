---
- name: Build context
  set_fact:

    dirs:
      home: "{{ python.home }}"

      apps: "{{ python.home }}\\apps"
      packages: "{{ python.home }}\\packages"
      scripts: "{{ python.home }}\\scripts"

      logs: "{{ python.home }}\\logs"

      upload: "{{ python.home }}\\upload"
      whl: "{{ python.home }}\\whl"

      backup: "{{ backup.home }}"

      lock: "{{ python.home }}\\.locks"

      venv: "{{ python.home }}\\venv"

      as: "{{ python.home }}\\{{ legacy.as_dir }}"

    files:
      python: "{{ dirs.venv }}\\Scripts\\python.exe"

      requirements: "{{ dirs.home }}\\requirements.txt"

      pyproject: "{{ dirs.home }}\\pyproject.toml"

      lock: "{{ dirs.lock }}\\python.deploy.lock"

      junction: "{{ dirs.as }}\\{{ legacy.link_name }}"
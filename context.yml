---
- name: Validate base variables
  assert:
    that:
      - base is defined
      - base.deploy is defined
      - base.backup is defined
      - base.tools is defined
      - base.imap is defined
    fail_msg: "base 변수 설정을 확인하세요."

- name: Validate Python variables
  assert:
    that:
      - python is defined
      - python.executable is defined
    fail_msg: "python 변수 설정을 확인하세요."

- name: Validate application variables
  assert:
    that:
      - app is defined
      - app.name is defined
      - app.source_dir is defined
      - app.requirements_file is defined
      - app.requirements_link is defined
      - app.venv_dir is defined
      - app.python_executable is defined
      - app.log_dir is defined
      - app.backup_dir is defined
    fail_msg: "app 변수 설정을 확인하세요."

- name: Validate script variables
  assert:
    that:
      - scripts is defined
      - scripts.home is defined
      - install is defined
      - install.script_file is defined
    fail_msg: "설치 스크립트 변수를 확인하세요."

- name: Validate junction variables
  assert:
    that:
      - junction is defined
      - junction.link is defined
      - junction.target is defined
    fail_msg: "junction 변수 설정을 확인하세요."

- name: Show deployment context
  debug:
    msg:
      - "APP_NAME={{ app.name }}"
      - "SOURCE_DIR={{ app.source_dir }}"
      - "VENV_DIR={{ app.venv_dir }}"
      - "PYTHON_EXECUTABLE={{ app.python_executable }}"
      - "REQUIREMENTS_FILE={{ app.requirements_file }}"
      - "REQUIREMENTS_LINK={{ app.requirements_link }}"
      - "INSTALL_SCRIPT={{ install.script_file }}"
      - "LOG_DIR={{ app.log_dir }}"
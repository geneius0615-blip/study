---
- name: Show imap-gateway deployment context
  ansible.builtin.debug:
    msg:
      - "APP_NAME={{ app.name }}"
      - "DEPLOY_ROOT={{ app.deploy_root }}"
      - "DEPLOY_DIR={{ app.deploy_dir }}"
      - "GIT_URL={{ app.git_url }}"
      - "GIT_BRANCH={{ app.git_branch }}"
      - "PYTHON_HOME={{ python.home }}"
      - "VENV_DIR={{ python.venv_dir }}"
      - "PYTHON_EXECUTABLE={{ python.executable }}"
      - "PACKAGES_DIR={{ python.packages_dir }}"
      - "INSTALL_BAT={{ python.install_bat }}"
      - "LEGACY_SOURCE={{ legacy.source_dir }}"
      - "LEGACY_PACKAGES_LINK={{ legacy.packages_link }}"
      - "LEGACY_GATEWAY_LINK={{ legacy.gateway_link }}"
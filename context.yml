---
- name: Show OCR deployment context
  ansible.builtin.debug:
    msg:
      - 'Python home      : {{ python.home }}'
      - 'Packages path   : {{ python.packages_dir }}'
      - 'OCR path        : {{ python.ocr_dir }}'
      - 'Legacy source   : {{ python.legacy_source_dir }}'
      - 'Legacy packages : {{ python.legacy_packages_link }}'
      - 'Legacy OCR      : {{ python.legacy_ocr_link }}'
      - 'Venv Python     : {{ python.venv_python }}'
      - 'Install batch   : {{ python.install_bat }}'
      - 'Service name    : {{ ocr.service_name }}'
      - 'Health URL      : {{ ocr.health_url }}'
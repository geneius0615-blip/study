---
base:
  deploy: "E:\\Deploy"
  backup: "E:\\Backup"
  tools: "E:\\Tools"
  imap: "E:\\digital-twin-studio\\imap"

python:
  home: "{{ base.deploy }}\\Python"
  venv_root: "{{ python.home }}\\venv"
  logs_root: "{{ python.home }}\\logs"

app:
  name: "imap-gateway"
  source_dir: "{{ base.imap }}\\source\\apps\\imap-gateway"
  venv_dir: "{{ python.venv_root }}\\{{ app.name }}"
  python_executable: "{{ app.venv_dir }}\\Scripts\\python.exe"
  log_dir: "{{ python.logs_root }}\\{{ app.name }}"
  backup_dir: "{{ base.backup }}\\Python\\{{ app.name }}"
  requirements_file: "{{ app.source_dir }}\\requirements.txt"

junction:
  link: "{{ app.source_dir }}\\logs"
  target: "{{ app.log_dir }}"
---
# =============================================================================
# Application
# =============================================================================
app:
  name: imap-gateway

# =============================================================================
# Git
# =============================================================================
git:
  url: https://git.example.com/imap/imap-gateway.git
  branch: main

# =============================================================================
# Python
# =============================================================================
python:
  home: E:\Deploy\Python

  app_dir: E:\Deploy\Python\imap-gateway
  packages_dir: E:\Deploy\Python\packages

  venv_dir: E:\Deploy\Python\venv
  python_exe: E:\Deploy\Python\venv\Scripts\python.exe

# =============================================================================
# Legacy (하드코딩 호환)
# =============================================================================
legacy:
  root: E:\digital-twin-studio\imap

  source: E:\digital-twin-studio\imap\source
  apps: E:\digital-twin-studio\imap\source\apps

# =============================================================================
# Install
# =============================================================================
install:
  batch: E:\Deploy\Python\imap-gateway\script\install.bat

# =============================================================================
# Service
# =============================================================================
service:
  name: IMAPGatewayService

# =============================================================================
# Health Check
# =============================================================================
health:
  url: http://127.0.0.1:8001/health
---
base:
  deploy: "E:\\Deploy"
  backup: "E:\\Backup"
  tools: "E:\\Tools"
  imap: "E:\\digital-twin-studio\\imap"

python:
  home: "{{ base.deploy }}\\Python"
  venv_root: "{{ python.home }}\\venv"
  logs_root: "{{ python.home }}\\logs"

app:
  name: "imap-gateway"
  source_root: "{{ base.imap }}\\source\\apps"
  source_dir: "{{ base.imap }}\\source\\apps\\imap-gateway"
  venv_dir: "{{ python.venv_root }}\\imap-gateway"
  log_dir: "{{ python.logs_root }}\\imap-gateway"
  backup_dir: "{{ base.backup }}\\Python\\imap-gateway"
  requirements_file: "{{ base.imap }}\\source\\apps\\imap-gateway\\requirements.txt"

git:
  repo_url: "실제-Git-저장소-주소"
  repo_dir: "{{ app.source_dir }}"
  branch: "main"

junction:
  link: "{{ app.source_dir }}\\logs"
  target: "{{ app.log_dir }}"
---
app:
  name: "imap-gateway"

base:
  app: "E:\\App"
  backup: "E:\\Backup"
  tools: "E:\\Tools"
  imap: "E:\\digital-twin-studio\\imap"

python:
  home: "E:\\App\\Python"
  venv_dir: "E:\\App\\Python\\venv"
  executable: "E:\\App\\Python\\venv\\Scripts\\python.exe"
  packages_dir: "E:\\digital-twin-studio\\imap\\source\\packages"
  logs_dir: "E:\\App\\Python\\logs"

install:
  batch: "E:\\digital-twin-studio\\imap\\source\\script\\install.bat"
  working_dir: "E:\\digital-twin-studio\\imap\\source"

service:
  name: "IMAPGatewayService"
  port: 8001
  working_dir: "E:\\digital-twin-studio\\imap\\source\\apps\\imap-gateway"
  start_file: "run.py"
  stdout_log: "E:\\App\\Python\\logs\\imap-gateway-stdout.log"
  stderr_log: "E:\\App\\Python\\logs\\imap-gateway-stderr.log"

backup:
  directory: "E:\\Backup\\Python\\imap-gateway"

legacy:
  root: "E:\\digital-twin-studio\\imap"
  source_dir: "E:\\digital-twin-studio\\imap\\source"
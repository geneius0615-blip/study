---
- name: Create Deploy directories
  win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ base.deploy }}"
    - "{{ base.deploy }}\\Python"
    - "{{ base.deploy }}\\Python\\logs"
    - "{{ app.log_dir }}"
    - "{{ base.backup }}"
    - "{{ base.backup }}\\Python"
    - "{{ app.backup_dir }}"
    - "{{ base.imap }}"
    - "{{ base.imap }}\\source"
    - "{{ scripts.home }}"
    - "{{ base.imap }}\\source\\apps"
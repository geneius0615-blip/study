---
- name: Ensure bootstrap directories exist
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ base.app }}"
    - "{{ base.backup }}"
    - "{{ base.tools }}"
    - "{{ python.home }}"
    - "{{ python.logs_dir }}"
    - "{{ backup.directory }}"
    - "{{ legacy.root }}"
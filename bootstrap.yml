---
- name: Create bootstrap directories
  win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ base.deploy }}"
    - "{{ python.home }}"
    - "{{ python.venv_root }}"
    - "{{ python.logs_root }}"
    - "{{ app.log_dir }}"
    - "{{ base.backup }}"
    - "{{ base.backup }}\\Python"
    - "{{ app.backup_dir }}"
    - "{{ base.tools }}"
    - "{{ base.imap }}"
    - "{{ base.imap }}\\source"
    - "{{ base.imap }}\\source\\apps"

- name: Check bootstrap directories
  win_stat:
    path: "{{ item }}"
  loop:
    - "{{ python.venv_root }}"
    - "{{ python.logs_root }}"
    - "{{ app.log_dir }}"
    - "{{ app.backup_dir }}"
    - "{{ base.tools }}"
    - "{{ base.imap }}\\source\\apps"
  register: bootstrap_directory_results

- name: Validate bootstrap directories
  assert:
    that:
      - item.stat.exists
      - item.stat.isdir
    msg: "디렉터리 생성에 실패했습니다: {{ item.item }}"
  loop: "{{ bootstrap_directory_results.results }}"

- name: Show bootstrap result
  debug:
    msg:
      - "VENV_ROOT={{ python.venv_root }}"
      - "LOG_ROOT={{ python.logs_root }}"
      - "APP_LOG_DIR={{ app.log_dir }}"
      - "APP_BACKUP_DIR={{ app.backup_dir }}"
      - "SOURCE_APPS_DIR={{ base.imap }}\\source\\apps"
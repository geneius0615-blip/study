---
- name: Start Tomcat Windows service
  win_service:
    name: "{{ tomcat.service_name }}"
    state: started
    start_mode: auto
  register: tomcat_start_result

- name: Check Tomcat service status
  win_shell: |
    $service = Get-Service `
        -Name "{{ tomcat.service_name }}" `
        -ErrorAction Stop

    Write-Output "SERVICE_NAME=$($service.Name)"
    Write-Output "SERVICE_STATUS=$($service.Status)"

    if ($service.Status -eq "Running") {
        exit 0
    }

    exit 1
  register: tomcat_service_start_check
  retries: 30
  delay: 2
  until: tomcat_service_start_check.rc == 0
  changed_when: false

- name: Show Tomcat service status
  debug:
    var: tomcat_service_start_check.stdout_lines

- name: Wait until Tomcat port is listening
  win_shell: |
    $connection = Get-NetTCPConnection `
        -LocalPort {{ tomcat.port }} `
        -State Listen `
        -ErrorAction SilentlyContinue |
        Select-Object -First 1

    if ($null -ne $connection) {
        Write-Output "LISTEN_PORT=$($connection.LocalPort)"
        Write-Output "PROCESS_ID=$($connection.OwningProcess)"
        exit 0
    }

    Write-Output "Tomcat port {{ tomcat.port }} is not listening yet."
    exit 1
  register: tomcat_port_start_check
  retries: 60
  delay: 2
  until: tomcat_port_start_check.rc == 0
  changed_when: false
  failed_when: false

- name: Fail when Tomcat port is not listening
  fail:
    msg:
      - "Tomcat service status: {{ tomcat_service_start_check.stdout_lines }}"
      - "Tomcat port {{ tomcat.port }} did not open."
      - "Check Tomcat logs: {{ tomcat.home }}\\logs"
  when: tomcat_port_start_check.rc != 0

- name: Show Tomcat start result
  debug:
    msg:
      - "Tomcat service started: {{ tomcat.service_name }}"
      - "Tomcat port is listening: {{ tomcat.port }}"
location = /client {
    return 301 /client/;
}

location = /client/ {
    alias D:/Deploy/Vue/imap-client/dist/index.html;
}

location /client/assets/ {
    alias D:/Deploy/Vue/imap-client/dist/assets/;
}

location /client/ {
    alias D:/Deploy/Vue/imap-client/dist/;
    try_files $uri @client_spa;
}

location @client_spa {
    root D:/Deploy/Vue/imap-client/dist;
    try_files /index.html =404;
}
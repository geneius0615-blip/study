location = /client {
    return 301 /client/;
}

location = /client/ {
    alias E:/Deploy/Vue/imap-client/dist/index.html;
}

location /client/assets/ {
    alias E:/Deploy/Vue/imap-client/dist/assets/;
}

location /client/ {
    alias E:/Deploy/Vue/imap-client/dist/;
    try_files $uri @client_fallback;
}

location @client_fallback {
    internal;
    root E:/Deploy/Vue/imap-client/dist;
    try_files /index.html =404;
}
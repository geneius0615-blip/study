---
- name: Check install script
  win_stat:
    path: "{{ install.script_file }}"
  register: install_script

- name: Validate install script
  assert:
    that:
      - install_script.stat.exists
    fail_msg: "python-install.bat가 없습니다."

- name: Execute install script
  win_command: >
    cmd /c call "{{ install.script_file }}"
  args:
    chdir: "{{ base.imap }}\\source"
  register: install_result

- name: Show install output
  debug:
    var: install_result.stdout_lines

- name: Check virtual environment
  win_stat:
    path: "{{ app.python_executable }}"
  register: venv

- name: Validate virtual environment
  assert:
    that:
      - venv.stat.exists
    success_msg: ".venv 생성 완료"
    fail_msg: ".venv 생성 실패"
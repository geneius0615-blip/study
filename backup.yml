---
- name: Ensure Spring backup directory exists
  win_file:
    path: "{{ spring.backup_dir }}"
    state: directory

- name: Check current Spring WAR
  win_stat:
    path: "{{ spring.war_file }}"
  register: spring_war_stat

- name: Check current Spring exploded directory
  win_stat:
    path: "{{ spring.exploded_dir }}"
  register: spring_exploded_stat

- name: Set Spring deployment existence status
  set_fact:
    spring_existing_deployment: "{{ spring_war_stat.stat.exists or spring_exploded_stat.stat.exists }}"

- name: Show Spring backup status
  debug:
    msg:
      - "WAR exists      : {{ spring_war_stat.stat.exists }}"
      - "Exploded exists : {{ spring_exploded_stat.stat.exists }}"
      - "Backup required : {{ spring_existing_deployment }}"

- name: Create Spring deployment backup
  win_shell: |
    $ErrorActionPreference = "Stop"

    $backupFile = "{{ spring_backup_file }}"
    $warFile = "{{ spring.war_file }}"
    $explodedDir = "{{ spring.exploded_dir }}"

    $backupItems = @()

    if (Test-Path -LiteralPath $warFile -PathType Leaf) {
        $backupItems += $warFile
    }

    if (Test-Path -LiteralPath $explodedDir -PathType Container) {
        $backupItems += $explodedDir
    }

    if ($backupItems.Count -eq 0) {
        Write-Output "Existing Spring deployment was not found."
        exit 0
    }

    if (Test-Path -LiteralPath $backupFile) {
        Remove-Item -LiteralPath $backupFile -Force
    }

    Compress-Archive `
        -LiteralPath $backupItems `
        -DestinationPath $backupFile `
        -CompressionLevel Optimal `
        -Force

    if (-not (Test-Path -LiteralPath $backupFile)) {
        throw "Backup file was not created."
    }

    $backupInfo = Get-Item $backupFile

    if ($backupInfo.Length -le 0) {
        throw "Backup file size is zero."
    }

    Write-Output "Backup completed."
    Write-Output "Backup file : $backupFile"
    Write-Output "Backup size : $($backupInfo.Length)"

  args:
    executable: powershell.exe

  register: spring_backup_result
  when: spring_existing_deployment

- name: Mark Spring backup success
  set_fact:
    spring_backup_success: true
  when:
    - spring_existing_deployment
    - spring_backup_result.rc == 0

- name: Mark backup unnecessary for first deployment
  set_fact:
    spring_backup_success: true
  when: not spring_existing_deployment

- name: Show Spring backup result
  debug:
    var: spring_backup_result.stdout_lines
  when:
    - spring_existing_deployment
    - spring_backup_result.stdout_lines is defined

- name: Verify Spring backup file
  win_stat:
    path: "{{ spring_backup_file }}"
  register: spring_backup_stat
  when: spring_existing_deployment

- name: Verify Spring backup size
  fail:
    msg: "Spring 백업 파일이 생성되지 않았거나 크기가 0입니다."
  when:
    - spring_existing_deployment
    - not spring_backup_stat.stat.exists or (spring_backup_stat.stat.size | int) <= 0
---
- name: Create backup timestamp
  win_shell: |
    Get-Date -Format "yyyyMMdd_HHmmss"
  register: backup_time
  changed_when: false

- name: Build backup paths
  set_fact:
    backup_work_dir: "{{ dirs.backup }}\\work_{{ backup_time.stdout | trim }}"
    backup_zip_file: "{{ dirs.backup }}\\Python_{{ backup_time.stdout | trim }}.zip"

- name: Create backup root directory
  win_file:
    path: "{{ dirs.backup }}"
    state: directory

- name: Create backup work directory
  win_file:
    path: "{{ backup_work_dir }}"
    state: directory

- name: Copy deploy items to backup work directory
  win_shell: |
    $workDir = "{{ backup_work_dir }}"

    $items = @(
      "{{ dirs.apps }}",
      "{{ dirs.packages }}",
      "{{ dirs.scripts }}",
      "{{ files.requirements }}",
      "{{ files.pyproject }}"
    )

    foreach ($item in $items) {
      if (Test-Path $item) {
        $name = Split-Path $item -Leaf
        Copy-Item $item "$workDir\$name" -Recurse -Force
      }
    }

- name: Check backup work directory contents
  win_shell: |
    $workDir = "{{ backup_work_dir }}"

    if (-not (Test-Path "$workDir\*")) {
      Write-Host "No backup target exists. Skip compress."
      exit 0
    }

- name: Compress backup work directory
  win_shell: |
    Compress-Archive `
      -Path "{{ backup_work_dir }}\\*" `
      -DestinationPath "{{ backup_zip_file }}" `
      -Force

- name: Remove backup work directory
  win_file:
    path: "{{ backup_work_dir }}"
    state: absent

- name: Show backup file
  debug:
    msg: "Backup created: {{ backup_zip_file }}"
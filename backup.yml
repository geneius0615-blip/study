---
- name: Ensure Spring backup directory exists
  win_file:
    path: "{{ spring.backup_dir }}"
    state: directory

- name: Check current Spring WAR
  win_stat:
    path: "{{ spring.war_file }}"
  register: spring_war_stat

- name: Check current Spring exploded directory
  win_stat:
    path: "{{ spring.exploded_dir }}"
  register: spring_exploded_stat

- name: Set Spring deployment existence status
  set_fact:
    spring_existing_deployment: "{{ spring_war_stat.stat.exists or spring_exploded_stat.stat.exists }}"

- name: Create Spring deployment backup
  win_shell: |
    $ErrorActionPreference = "Stop"

    $backupFile = "{{ spring_backup_file }}"
    $warFile = "{{ spring.war_file }}"
    $explodedDir = "{{ spring.exploded_dir }}"
    $tempDir = "{{ spring.backup_dir }}\temp"

    if (Test-Path $tempDir) {
        Remove-Item $tempDir -Recurse -Force
    }

    New-Item -ItemType Directory -Path $tempDir -Force | Out-Null

    if (Test-Path $warFile) {
        Copy-Item $warFile $tempDir -Force
    }

    if (Test-Path $explodedDir) {
        Copy-Item $explodedDir $tempDir -Recurse -Force
    }

    if (Test-Path $backupFile) {
        Remove-Item $backupFile -Force
    }

    Compress-Archive `
        -Path "$tempDir\*" `
        -DestinationPath $backupFile `
        -Force

    Remove-Item $tempDir -Recurse -Force

  args:
    executable: powershell.exe

  register: spring_backup_result
  when: spring_existing_deployment

- name: Verify Spring backup file
  win_stat:
    path: "{{ spring_backup_file }}"
  register: spring_backup_stat
  when: spring_existing_deployment

- name: Fail when Spring backup file is invalid
  fail:
    msg: "Spring 백업 파일이 생성되지 않았거나 크기가 0입니다. ({{ spring_backup_file }})"
  when:
    - spring_existing_deployment
    - not spring_backup_stat.stat.exists or (spring_backup_stat.stat.size | default(0) | int) <= 0

- name: Mark Spring backup success
  set_fact:
    spring_backup_success: true
  when:
    - spring_existing_deployment
    - spring_backup_stat.stat.exists
    - (spring_backup_stat.stat.size | default(0) | int) > 0

- name: Mark backup unnecessary
  set_fact:
    spring_backup_success: true
  when: not spring_existing_deployment
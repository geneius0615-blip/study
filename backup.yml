---
- name: Create backup timestamp
  win_shell: |
    Get-Date -Format "yyyyMMdd_HHmmss"
  register: backup_time
  changed_when: false

- name: Build backup zip path
  set_fact:
    backup_zip_file: "{{ dirs.backup }}\\Python_{{ backup_time.stdout }}.zip"

- name: Compress deploy items
  win_shell: |
    $items = @(
      "{{ dirs.apps }}",
      "{{ dirs.packages }}",
      "{{ dirs.scripts }}",
      "{{ files.requirements }}",
      "{{ files.pyproject }}"
    )

    $exists = @()

    foreach ($item in $items) {
      if (Test-Path $item) {
        $exists += $item
      }
    }

    if ($exists.Count -eq 0) {
      Write-Host "No deploy items found. Skip backup."
      exit 0
    }

    Compress-Archive `
      -Path $exists `
      -DestinationPath "{{ backup_zip_file }}" `
      -Force

- name: Show backup file
  debug:
    msg: "Backup created: {{ backup_zip_file }}"
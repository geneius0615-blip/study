---
- name: Check Tomcat service
  win_shell: |
    $service = Get-Service `
        -Name "{{ tomcat.service_name }}" `
        -ErrorAction SilentlyContinue

    if ($null -eq $service) {
        Write-Error "Tomcat service '{{ tomcat.service_name }}' was not found."
        exit 1
    }

    exit 0
  changed_when: false

- name: Stop Tomcat service
  win_service:
    name: "{{ tomcat.service_name }}"
    state: stopped

- name: Wait until Tomcat port is released
  win_shell: |
    $connection = Get-NetTCPConnection `
        -LocalPort {{ tomcat.port }} `
        -State Listen `
        -ErrorAction SilentlyContinue

    if ($null -eq $connection) {
        exit 0
    }

    exit 1
  register: tomcat_stop_check
  retries: 30
  delay: 2
  until: tomcat_stop_check.rc == 0
  changed_when: false

- name: Show Tomcat stop result
  debug:
    msg: "Tomcat service stopped. Port {{ tomcat.port }} is not listening."
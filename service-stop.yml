---
- name: Stop Tomcat by shutdown script
  win_shell: |
    cmd /c call "{{ tomcat.home }}\bin\shutdown.bat"
  register: tomcat_shutdown_result
  failed_when: false

- name: Wait after Tomcat shutdown
  win_shell: |
    Start-Sleep -Seconds 5
  changed_when: false

- name: Find remaining Tomcat process
  win_shell: |
    $processes = Get-CimInstance Win32_Process | Where-Object {
        ($_.Name -eq "java.exe" -or $_.Name -eq "javaw.exe") -and
        (
            $_.CommandLine -like "*-Dcatalina.home={{ tomcat.home }}*" -or
            $_.CommandLine -like "*-Dcatalina.base={{ tomcat.home }}*"
        )
    }

    if ($processes) {
        $processes | ForEach-Object {
            Write-Output $_.ProcessId
        }
    }
  register: tomcat_remaining_process
  changed_when: false

- name: Show remaining Tomcat process
  debug:
    msg: "Remaining Tomcat PID: {{ tomcat_remaining_process.stdout | default('') }}"

- name: Force stop remaining Tomcat process
  win_shell: |
    $processes = Get-CimInstance Win32_Process | Where-Object {
        ($_.Name -eq "java.exe" -or $_.Name -eq "javaw.exe") -and
        (
            $_.CommandLine -like "*-Dcatalina.home={{ tomcat.home }}*" -or
            $_.CommandLine -like "*-Dcatalina.base={{ tomcat.home }}*"
        )
    }

    $processes | ForEach-Object {
        Stop-Process -Id $_.ProcessId -Force
    }
  when:
    - tomcat_remaining_process.stdout is defined
    - tomcat_remaining_process.stdout | trim | length > 0

- name: Verify Tomcat process stopped
  win_shell: |
    $processes = Get-CimInstance Win32_Process | Where-Object {
        ($_.Name -eq "java.exe" -or $_.Name -eq "javaw.exe") -and
        (
            $_.CommandLine -like "*-Dcatalina.home={{ tomcat.home }}*" -or
            $_.CommandLine -like "*-Dcatalina.base={{ tomcat.home }}*"
        )
    }

    if ($processes) {
        exit 1
    }

    exit 0
  register: tomcat_final_check
  retries: 10
  delay: 2
  until: tomcat_final_check.rc == 0
  changed_when: false
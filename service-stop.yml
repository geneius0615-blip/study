---
- name: Stop Tomcat by shutdown script
  win_shell: |
    cmd /c call "{{ tomcat.home }}\bin\shutdown.bat"
  register: tomcat_shutdown_result
  failed_when: false

- name: Wait after Tomcat shutdown
  win_shell: |
    Start-Sleep -Seconds 5
  changed_when: false

- name: Find Tomcat process by port
  win_shell: |
    $connection = Get-NetTCPConnection `
        -LocalPort {{ tomcat.port }} `
        -State Listen `
        -ErrorAction SilentlyContinue |
        Select-Object -First 1

    if ($connection) {
        Write-Output $connection.OwningProcess
    }
  register: tomcat_port_process
  changed_when: false

- name: Show Tomcat process id
  debug:
    msg: "Tomcat PID: {{ tomcat_port_process.stdout | default('') }}"

- name: Force stop remaining Tomcat process
  win_shell: |
    Stop-Process -Id {{ tomcat_port_process.stdout | trim }} -Force
  when:
    - tomcat_port_process.stdout is defined
    - (tomcat_port_process.stdout | trim | length) > 0

- name: Wait until Tomcat port is released
  win_shell: |
    $connection = Get-NetTCPConnection `
        -LocalPort {{ tomcat.port }} `
        -State Listen `
        -ErrorAction SilentlyContinue

    if ($connection) {
        exit 1
    }

    exit 0
  register: tomcat_port_check
  retries: 10
  delay: 2
  until: tomcat_port_check.rc == 0
  changed_when: false
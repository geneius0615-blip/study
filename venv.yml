---
- name: Define venv batch files
  set_fact:
    venv_batch_files:
      - name: Server config
        path: "{{ files.server_config_bat }}"
        workdir: "{{ dirs.home }}"

      - name: Setup virtual environment
        path: "{{ files.setup_venv_bat }}"
        workdir: "{{ dirs.home }}"

      - name: Install editable packages
        path: "{{ files.install_packages_bat }}"
        workdir: "{{ dirs.home }}"

- name: Check batch files
  win_stat:
    path: "{{ item.path }}"
  loop: "{{ venv_batch_files }}"
  register: batch_checks
  loop_control:
    label: "{{ item.name }}"

- name: Fail if batch file is missing
  fail:
    msg: "Batch file not found: {{ item.item.path }}"
  when: not item.stat.exists
  loop: "{{ batch_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Run batch files
  win_shell: |
    cmd /c call "{{ item.path }}"
  args:
    chdir: "{{ item.workdir }}"
  loop: "{{ venv_batch_files }}"
  loop_control:
    label: "{{ item.name }}"
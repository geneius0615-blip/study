---
- name: Define venv setup batch files
  set_fact:
    venv_batch_files:
      - name: Git setup
        path: "{{ files.git_setup_bat }}"

      - name: Server config update
        path: "{{ files.server_config_bat }}"

      - name: Venv and requirements setup
        path: "{{ files.setup_venv_bat }}"

      - name: Editable package install
        path: "{{ files.install_packages_bat }}"

- name: Check venv batch files
  win_stat:
    path: "{{ item.path }}"
  loop: "{{ venv_batch_files }}"
  register: venv_batch_checks
  loop_control:
    label: "{{ item.name }}"

- name: Fail if batch file is missing
  fail:
    msg: "Batch file not found: {{ item.item.path }}"
  loop: "{{ venv_batch_checks.results }}"
  when: not item.stat.exists
  loop_control:
    label: "{{ item.item.name }}"

- name: Run venv setup batch files in order
  win_shell: |
    cmd /c call "{{ item.path }}"
  args:
    chdir: "{{ dirs.home }}"
  loop: "{{ venv_batch_files }}"
  loop_control:
    label: "{{ item.name }}"
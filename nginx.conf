http {
    upstream auth_backend {
        server 127.0.0.1:9090;
    }

    upstream spring_backend {
        server 127.0.0.1:8080;
    }

    upstream fastapi_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # -------------------------------------------------
        # 1. 인증 없이 접근 가능한 경로
        # -------------------------------------------------

        location /auth/ {
            proxy_pass http://auth_backend/imap-auth/auth/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /favicon.ico {
            root E:/Deploy/Vue/imap-client/dist;
        }

        # 로그인 화면을 Vue 안에 둘 경우 공개 처리
        location = /login {
            root E:/Deploy/Vue/imap-client/dist;
            try_files /index.html =404;
        }

        # -------------------------------------------------
        # 2. 공통 인증 확인용 내부 location
        # -------------------------------------------------

        location = /_auth_check {
            internal;

            proxy_pass http://auth_backend/imap-auth/internal/auth/check;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;

            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------------
        # 3. Vue 프론트엔드 보호
        # -------------------------------------------------

        location / {
            auth_request /_auth_check;

            error_page 401 = @login_redirect;

            root E:/Deploy/Vue/imap-client/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # -------------------------------------------------
        # 4. Spring Boot 보호
        # -------------------------------------------------

        location /api/spring/ {
            auth_request /_auth_check;

            auth_request_set $auth_user_id
                $upstream_http_x_user_id;

            auth_request_set $auth_user_role
                $upstream_http_x_user_role;

            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://spring_backend/;
        }

        # -------------------------------------------------
        # 5. FastAPI 보호
        # -------------------------------------------------

        location /api/fastapi/ {
            auth_request /_auth_check;

            auth_request_set $auth_user_id
                $upstream_http_x_user_id;

            auth_request_set $auth_user_role
                $upstream_http_x_user_role;

            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://fastapi_backend/;
        }

        # -------------------------------------------------
        # 6. 인증 실패 시 로그인 페이지로 이동
        # -------------------------------------------------

        location @login_redirect {
            return 302 /login?redirect=$request_uri;
        }
    }
}
---
- name: Vue 관련 폴더 생성
  win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ vue.backup_dir }}"
    - "{{ vue.temp_dir }}"

- name: Vue artifact 확인
  win_stat:
    path: "{{ vue.artifact_file }}"
  register: vue_artifact

- name: Vue artifact 검증
  assert:
    that:
      - "vue_artifact.stat.exists"
      - "not vue_artifact.stat.isdir"
    msg: "Vue tar 파일이 없습니다: {{ vue.artifact_file }}"

- name: 배포 시간 생성
  win_shell: Get-Date -Format "yyyyMMdd_HHmmss"
  register: vue_timestamp
  changed_when: false

- name: 백업 파일 경로 설정
  set_fact:
    vue_backup_file: "{{ vue.backup_dir }}\\imap-client_{{ vue_timestamp.stdout | trim }}.tar"

- name: 기존 Vue 배포 폴더 확인
  win_stat:
    path: "{{ vue.deploy_dir }}"
  register: vue_existing_dir

- name: 기존 Vue 배포 폴더 백업
  win_shell: |
    $source = '{{ vue.deploy_dir }}'
    $backup = '{{ vue_backup_file }}'

    if (Test-Path -LiteralPath $source -PathType Container) {
        & tar.exe -cf "$backup" -C "$source" .

        if ($LASTEXITCODE -ne 0) {
            throw "기존 Vue 배포 폴더 백업 실패"
        }
    }
  when:
    - "vue_existing_dir.stat.exists"
    - "vue_existing_dir.stat.isdir"

- name: Vue 임시 폴더 초기화
  win_file:
    path: "{{ vue.temp_dir }}"
    state: absent

- name: Vue 임시 폴더 생성
  win_file:
    path: "{{ vue.temp_dir }}"
    state: directory

- name: Vue artifact 압축 해제
  win_shell: |
    & tar.exe -xf "{{ vue.artifact_file }}" -C "{{ vue.temp_dir }}"

    if ($LASTEXITCODE -ne 0) {
        throw "Vue artifact 압축 해제 실패"
    }

- name: 압축 해제된 index.html 검색
  win_find:
    paths: "{{ vue.temp_dir }}"
    patterns: "index.html"
    recurse: yes
    file_type: file
  register: vue_index

- name: Vue 압축 해제 결과 검증
  assert:
    that:
      - "vue_index.matched == 1"
    msg: "tar 파일에서 index.html을 찾지 못했습니다."

- name: Vue 배포 소스 경로 설정
  set_fact:
    vue_source_dir: "{{ vue_index.files[0].path | win_dirname }}"

- name: 기존 Vue 배포 폴더 삭제
  win_file:
    path: "{{ vue.deploy_dir }}"
    state: absent

- name: Vue 배포 폴더 생성
  win_file:
    path: "{{ vue.deploy_dir }}"
    state: directory

- name: Vue 파일 배포
  win_copy:
    src: "{{ vue_source_dir }}\\"
    dest: "{{ vue.deploy_dir }}\\"
    remote_src: yes

- name: 배포된 index.html 확인
  win_stat:
    path: "{{ vue.deploy_dir }}\\index.html"
  register: vue_deployed_index

- name: Vue 배포 결과 검증
  assert:
    that:
      - "vue_deployed_index.stat.exists"
    msg: "Vue 배포 후 index.html이 없습니다."

- name: Vue 임시 폴더 정리
  win_file:
    path: "{{ vue.temp_dir }}"
    state: absent

- name: Vue 배포 완료
  debug:
    msg:
      - "artifact={{ vue.artifact_file }}"
      - "deploy={{ vue.deploy_dir }}"
      - "backup={{ vue_backup_file }}"
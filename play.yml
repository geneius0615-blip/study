---
- hosts: windows
  gather_facts: false

  tasks:
    - import_tasks: roles/apps/tasks/context.yml
      tags: always

    - import_tasks: roles/apps/tasks/bootstrap.yml
      tags: bootstrap

    - import_tasks: roles/apps/tasks/git.yml
      tags: git

    - import_tasks: roles/apps/tasks/junction.yml
      tags: junction

    - import_tasks: roles/apps/tasks/install.yml
      tags: install

    - import_tasks: roles/apps/tasks/service-stop.yml
      tags: service-stop

    - import_tasks: roles/apps/tasks/service-start.yml
      tags: service-start
---
- name: Check Tomcat service
  win_shell: |
    $service = Get-Service `
        -Name "{{ tomcat.service_name }}" `
        -ErrorAction SilentlyContinue

    if ($null -eq $service) {
        Write-Error "Tomcat service '{{ tomcat.service_name }}' was not found."
        exit 1
    }

    exit 0
  changed_when: false

- name: Start Tomcat service
  win_service:
    name: "{{ tomcat.service_name }}"
    state: started
    start_mode: auto

- name: Wait until Tomcat port is listening
  win_shell: |
    $connection = Get-NetTCPConnection `
        -LocalPort {{ tomcat.port }} `
        -State Listen `
        -ErrorAction SilentlyContinue

    if ($null -ne $connection) {
        exit 0
    }

    exit 1
  register: tomcat_start_check
  retries: 30
  delay: 2
  until: tomcat_start_check.rc == 0
  changed_when: false

- name: Show Tomcat start result
  debug:
    msg: "Tomcat service started. Port {{ tomcat.port }} is listening."